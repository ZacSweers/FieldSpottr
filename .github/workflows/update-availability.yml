name: Update availability

on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-availability
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FIELDSPOTTR_BOT_TOKEN || github.token }}

      - name: Install JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Dump HRP fields page
        continue-on-error: true
        run: |
          mkdir -p build/hrp
          CHROME="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          "$CHROME" \
              --headless=new \
              --disable-gpu \
              --no-sandbox \
              --dump-dom \
              https://hudsonriverpark.org/visit/events/permits/fields/ \
              > build/hrp/fields.html

      - name: Generate availability data
        run: |
          ARGS="--output=."
          if [ -s build/hrp/fields.html ]; then
            ARGS="$ARGS --hrp-source-file=build/hrp/fields.html"
          fi
          ./gradlew :generator:run --args="$ARGS"

      - name: Commit generated data
        id: commit
        run: |
          if [ -z "$(git status --porcelain -- areas.json availability)" ]; then
            echo "No availability changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="automation/update-availability-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add areas.json availability
          git commit -m "Update availability data"
          git push --set-upstream origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.FIELDSPOTTR_BOT_TOKEN || github.token }}
        run: |
          pr_url="$(
            gh pr create \
              --base main \
              --head "${{ steps.commit.outputs.branch }}" \
              --title "Update availability data" \
              --body "Automated availability data refresh."
          )"
          echo "url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pr.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.FIELDSPOTTR_BOT_TOKEN || github.token }}
        run: gh pr merge --auto --squash --delete-branch "${{ steps.pr.outputs.url }}"

      - name: (Fail-only) Upload generated data
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: availability-debug
          path: |
            areas.json
            availability/**
            build/hrp/**
            generator/build/reports/**
